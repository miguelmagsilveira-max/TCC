<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Flow — Login</title>
  <script src="/static/js/theme.js"></script>
  <script>window.tailwind = {config: {darkMode: 'class'}};</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="h-screen flex overflow-hidden">

  <!-- Left panel -->
  <div class="hidden md:flex w-2/5 flex-col justify-center px-12 relative overflow-hidden" style="background-color:#1e3a5f;">
    <div class="absolute -top-24 -right-24 w-72 h-72 rounded-full" style="background:rgba(255,255,255,0.04)"></div>
    <div class="absolute -bottom-16 -left-16 w-56 h-56 rounded-full" style="background:rgba(255,255,255,0.04)"></div>
    <div class="absolute top-1/3 right-8 w-36 h-36 rounded-full" style="background:rgba(255,255,255,0.03)"></div>

    <div class="relative z-10">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-6" style="background:rgba(255,255,255,0.15)">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      </div>
      <h1 class="text-5xl font-bold text-white mb-3">Stock Flow</h1>
      <p class="text-blue-200 text-xl font-medium mb-4 leading-snug">Gestão de Ativos de TI</p>
      <p class="text-blue-300 text-sm leading-relaxed">
        Controle completo do inventário de TI.<br>
        Rastreie ativos, gerencie colaboradores e mantenha histórico detalhado de todas as movimentações.
      </p>
    </div>
  </div>

  <!-- Right panel (form) -->
  <div class="flex-1 flex items-center justify-center bg-white px-8">
    <div class="w-full max-w-sm">
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-800">Bem-vindo de volta</h2>
        <p class="text-slate-500 mt-1 text-sm">Faça login para continuar</p>
      </div>

      {% if erro %}
      <div class="mb-5 p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2">
        <svg class="w-4 h-4 text-red-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-red-700 text-sm">{{ erro }}</p>
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">E-mail</label>
          <input type="email" name="email" required placeholder="seu@email.com"
                 class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
          <input type="password" name="senha" required placeholder="••••••••"
                 class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors">
        </div>
        <button type="submit"
                class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm rounded-lg transition-colors mt-2">
          Entrar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
